name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: Typecheck, Build, Smoke, Visual
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poppler
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "25.12.0-0"
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v$version/Release-$version.zip"
          $installRoot = Join-Path $env:RUNNER_TEMP "poppler"
          $zipPath = Join-Path $env:RUNNER_TEMP "poppler-$version.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $installRoot -Force
          $bin = Get-ChildItem -Path $installRoot -Recurse -Filter pdftoppm.exe |
            Select-Object -First 1 |
            ForEach-Object { $_.Directory.FullName }
          if (-not $bin) {
            throw "pdftoppm.exe not found after extracting Poppler"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          & (Join-Path $bin "pdftoppm.exe") -v

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Strict unused check
        run: bunx tsc --noEmit --noUnusedLocals --noUnusedParameters

      - name: Build
        run: bun run build

      - name: Node runtime smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path tmp/pdfs | Out-Null
          @'
          import { writeFile } from "node:fs/promises";
          import { renderHtmlToPdfDetailed } from "./dist/index.js";
          const result = await renderHtmlToPdfDetailed({
            html: "<!doctype html><html><body><h1>Node runtime smoke</h1><table><tr><th>A</th><th>B</th></tr><tr><td>1</td><td>2</td></tr></table></body></html>",
          });
          await writeFile("tmp/pdfs/node-runtime-smoke.pdf", result.pdf);
          if (result.pages < 1 || result.pdf.byteLength < 1000) {
            throw new Error(`Invalid Node render result: ${JSON.stringify({ pages: result.pages, bytes: result.pdf.byteLength })}`);
          }
          console.log({ pages: result.pages, bytes: result.pdf.byteLength, warnings: result.warnings.map((warning) => warning.code) });
          '@ | node --input-type=module

      - name: Smoke
        run: bun run smoke

      - name: Visual regression
        run: bun run visual

      - name: Package dry run
        run: npm pack --dry-run
