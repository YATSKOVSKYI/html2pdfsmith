<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <style>
      @keyframes shimmer {
        0% { stop-color: #6366f1; }
        25% { stop-color: #8b5cf6; }
        50% { stop-color: #a78bfa; }
        75% { stop-color: #8b5cf6; }
        100% { stop-color: #6366f1; }
      }
      @keyframes shimmer2 {
        0% { stop-color: #a78bfa; }
        25% { stop-color: #c084fc; }
        50% { stop-color: #e879f9; }
        75% { stop-color: #c084fc; }
        100% { stop-color: #a78bfa; }
      }
      @keyframes fadeSlideUp {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes iconPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes dashDraw {
        0% { stroke-dashoffset: 200; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes particleFade {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
      @keyframes taglineReveal {
        0% { opacity: 0; letter-spacing: 8px; }
        100% { opacity: 0.7; letter-spacing: 3.5px; }
      }
      .title-main {
        animation: fadeSlideUp 0.9s ease-out both;
      }
      .title-accent {
        animation: fadeSlideUp 0.9s ease-out 0.15s both;
      }
      .icon-group {
        animation: iconPulse 3s ease-in-out infinite;
        transform-origin: 95px 100px;
      }
      .tagline {
        animation: taglineReveal 1.2s ease-out 0.5s both;
      }
      .doc-line {
        stroke-dasharray: 200;
        animation: dashDraw 1.5s ease-out 0.3s both;
      }
      .particle {
        animation: particleFade 2.5s ease-in-out infinite;
      }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#6366f1;#8b5cf6;#a78bfa;#8b5cf6;#6366f1" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#a78bfa;#c084fc;#e879f9;#c084fc;#a78bfa" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="#0f0f23"/>
  <rect width="800" height="200" rx="16" fill="url(#grad2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Floating particles -->
  <circle cx="680" cy="45" r="2" fill="#818cf8" opacity="0.3" class="particle"/>
  <circle cx="720" cy="155" r="1.5" fill="#c084fc" opacity="0.25" class="particle" style="animation-delay: 0.8s"/>
  <circle cx="180" cy="35" r="1.5" fill="#a78bfa" opacity="0.2" class="particle" style="animation-delay: 1.5s"/>
  <circle cx="600" cy="170" r="2" fill="#818cf8" opacity="0.2" class="particle" style="animation-delay: 1.2s"/>
  <circle cx="350" cy="180" r="1" fill="#c084fc" opacity="0.15" class="particle" style="animation-delay: 2s"/>

  <!-- Icon: Document with arrow -->
  <g class="icon-group">
    <!-- HTML doc -->
    <rect x="55" y="55" width="42" height="52" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="2" opacity="0.9"/>
    <g class="doc-line">
      <line x1="63" y1="70" x2="89" y2="70" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="63" y1="78" x2="83" y2="78" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="63" y1="86" x2="86" y2="86" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="63" y1="94" x2="79" y2="94" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    </g>
    <text x="68" y="66" font-family="monospace" font-size="7" fill="#a78bfa" opacity="0.7">&lt;/&gt;</text>

    <!-- Arrow -->
    <g opacity="0.7">
      <line x1="104" y1="81" x2="118" y2="81" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round">
        <animate attributeName="x2" values="118;122;118" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <polyline points="115,77 121,81 115,85" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="points" values="115,77 121,81 115,85;117,77 123,81 117,85;115,77 121,81 115,85" dur="1.5s" repeatCount="indefinite"/>
      </polyline>
    </g>

    <!-- PDF doc -->
    <rect x="126" y="58" width="38" height="46" rx="3" fill="none" stroke="url(#iconGrad)" stroke-width="2" opacity="0.9"/>
    <text x="131" y="86" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="url(#grad1)">PDF</text>
    <!-- Corner fold -->
    <path d="M152 58 L164 58 L164 70 Z" fill="#6366f1" opacity="0.15"/>
    <path d="M152 58 L152 70 L164 70" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Title -->
  <g class="title-main">
    <text x="200" y="90" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="46" font-weight="800" fill="url(#grad1)" letter-spacing="-1">Html2Pdf</text>
  </g>
  <g class="title-accent">
    <text x="495" y="90" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="46" font-weight="800" fill="#e2e8f0" letter-spacing="-1">Smith</text>
  </g>

  <!-- Tagline -->
  <text x="202" y="120" class="tagline" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" fill="#94a3b8" letter-spacing="3.5">BROWSERLESS  •  STREAMING  •  TYPESCRIPT</text>

  <!-- Feature pills -->
  <g opacity="0" style="animation: fadeSlideUp 0.7s ease-out 0.7s both">
    <rect x="200" y="140" width="82" height="26" rx="13" fill="#6366f1" opacity="0.12"/>
    <text x="220" y="157" font-family="ui-sans-serif,sans-serif" font-size="10.5" font-weight="600" fill="#818cf8">⚡ Fast</text>
  </g>
  <g opacity="0" style="animation: fadeSlideUp 0.7s ease-out 0.85s both">
    <rect x="292" y="140" width="118" height="26" rx="13" fill="#8b5cf6" opacity="0.12"/>
    <text x="306" y="157" font-family="ui-sans-serif,sans-serif" font-size="10.5" font-weight="600" fill="#a78bfa">🪶 ~41 MB RSS</text>
  </g>
  <g opacity="0" style="animation: fadeSlideUp 0.7s ease-out 1.0s both">
    <rect x="420" y="140" width="130" height="26" rx="13" fill="#7c3aed" opacity="0.12"/>
    <text x="434" y="157" font-family="ui-sans-serif,sans-serif" font-size="10.5" font-weight="600" fill="#a78bfa">🚫 No Chromium</text>
  </g>
  <g opacity="0" style="animation: fadeSlideUp 0.7s ease-out 1.15s both">
    <rect x="560" y="140" width="100" height="26" rx="13" fill="#6d28d9" opacity="0.12"/>
    <text x="575" y="157" font-family="ui-sans-serif,sans-serif" font-size="10.5" font-weight="600" fill="#a78bfa">📄 Streaming</text>
  </g>

  <!-- Version badge -->
  <g opacity="0" style="animation: fadeSlideUp 0.7s ease-out 0.4s both">
    <rect x="638" y="73" width="54" height="20" rx="10" fill="#6366f1" opacity="0.15"/>
    <text x="650" y="87" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#818cf8">v0.1.0</text>
  </g>
</svg>
