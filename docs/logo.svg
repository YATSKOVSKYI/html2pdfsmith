<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" fill="none">
  <defs>
    <style>
      @keyframes gradientShift {
        0%,100% { stop-color: #7c3aed; }
        33% { stop-color: #8b5cf6; }
        66% { stop-color: #6d28d9; }
      }
      @keyframes gradientShift2 {
        0%,100% { stop-color: #a78bfa; }
        33% { stop-color: #c4b5fd; }
        66% { stop-color: #8b5cf6; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes arrowSlide {
        0%,100% { transform: translateX(0); opacity: 0.8; }
        50% { transform: translateX(5px); opacity: 1; }
      }
      @keyframes docFloat {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes glowPulse {
        0%,100% { opacity: 0.06; }
        50% { opacity: 0.12; }
      }
      @keyframes dotFade {
        0%,100% { opacity: 0; }
        50% { opacity: 0.5; }
      }
      @keyframes lineReveal {
        from { stroke-dashoffset: 40; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      .hero-title { animation: fadeIn 0.8s ease-out both; }
      .hero-smith { animation: fadeIn 0.8s ease-out 0.1s both; }
      .tagline-text { animation: fadeIn 0.6s ease-out 0.35s both; }
      .html-doc { animation: docFloat 4s ease-in-out infinite; transform-origin: 115px 115px; }
      .pdf-doc { animation: docFloat 4s ease-in-out 0.5s infinite; transform-origin: 255px 115px; }
      .arrow-group { animation: arrowSlide 2s ease-in-out infinite; transform-origin: 185px 118px; }
      .glow-orb { animation: glowPulse 3s ease-in-out infinite; }
      .dot-particle { animation: dotFade 3s ease-in-out infinite; }
      .doc-line-anim { stroke-dasharray: 40; animation: lineReveal 1s ease-out 0.5s both; }
      .pill { animation: fadeIn 0.5s ease-out both; }
      .pill-1 { animation-delay: 0.5s; }
      .pill-2 { animation-delay: 0.65s; }
      .pill-3 { animation-delay: 0.8s; }
      .pill-4 { animation-delay: 0.95s; }
      .tech-badge { animation: scaleIn 0.6s ease-out both; }
      .tech-ts { animation-delay: 0.6s; }
      .tech-bun { animation-delay: 0.75s; }
    </style>

    <!-- Main gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"><animate attributeName="stop-color" values="#7c3aed;#8b5cf6;#6d28d9;#7c3aed" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%"><animate attributeName="stop-color" values="#a78bfa;#c4b5fd;#8b5cf6;#a78bfa" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>

    <!-- Subtle bg glow gradient -->
    <radialGradient id="bgGlow" cx="40%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- HTML badge gradient -->
    <linearGradient id="htmlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <!-- PDF badge gradient -->
    <linearGradient id="pdfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Doc shadow -->
    <filter id="docShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Corner clip for page fold -->
    <clipPath id="htmlClip">
      <path d="M80 72 L150 72 L150 162 L80 162 Z"/>
    </clipPath>
    <clipPath id="pdfClip">
      <path d="M220 72 L290 72 L290 162 L220 162 Z"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="840" height="280" rx="16" fill="#0c0c1d"/>
  <rect width="840" height="280" rx="16" fill="url(#bgGlow)" class="glow-orb"/>

  <!-- Subtle dot grid -->
  <g opacity="0.035" fill="#a78bfa">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/><circle cx="280" cy="40" r="1"/><circle cx="320" cy="40" r="1"/><circle cx="360" cy="40" r="1"/><circle cx="400" cy="40" r="1"/><circle cx="440" cy="40" r="1"/><circle cx="480" cy="40" r="1"/><circle cx="520" cy="40" r="1"/><circle cx="560" cy="40" r="1"/><circle cx="600" cy="40" r="1"/><circle cx="640" cy="40" r="1"/><circle cx="680" cy="40" r="1"/><circle cx="720" cy="40" r="1"/><circle cx="760" cy="40" r="1"/><circle cx="800" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="280" cy="80" r="1"/><circle cx="320" cy="80" r="1"/><circle cx="360" cy="80" r="1"/><circle cx="400" cy="80" r="1"/><circle cx="440" cy="80" r="1"/><circle cx="480" cy="80" r="1"/><circle cx="520" cy="80" r="1"/><circle cx="560" cy="80" r="1"/><circle cx="600" cy="80" r="1"/><circle cx="640" cy="80" r="1"/><circle cx="680" cy="80" r="1"/><circle cx="720" cy="80" r="1"/><circle cx="760" cy="80" r="1"/><circle cx="800" cy="80" r="1"/>
    <circle cx="40" cy="120" r="1"/><circle cx="80" cy="120" r="1"/><circle cx="120" cy="120" r="1"/><circle cx="160" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="280" cy="120" r="1"/><circle cx="320" cy="120" r="1"/><circle cx="360" cy="120" r="1"/><circle cx="400" cy="120" r="1"/><circle cx="440" cy="120" r="1"/><circle cx="480" cy="120" r="1"/><circle cx="520" cy="120" r="1"/><circle cx="560" cy="120" r="1"/><circle cx="600" cy="120" r="1"/><circle cx="640" cy="120" r="1"/><circle cx="680" cy="120" r="1"/><circle cx="720" cy="120" r="1"/><circle cx="760" cy="120" r="1"/><circle cx="800" cy="120" r="1"/>
    <circle cx="40" cy="160" r="1"/><circle cx="80" cy="160" r="1"/><circle cx="120" cy="160" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="200" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="280" cy="160" r="1"/><circle cx="320" cy="160" r="1"/><circle cx="360" cy="160" r="1"/><circle cx="400" cy="160" r="1"/><circle cx="440" cy="160" r="1"/><circle cx="480" cy="160" r="1"/><circle cx="520" cy="160" r="1"/><circle cx="560" cy="160" r="1"/><circle cx="600" cy="160" r="1"/><circle cx="640" cy="160" r="1"/><circle cx="680" cy="160" r="1"/><circle cx="720" cy="160" r="1"/><circle cx="760" cy="160" r="1"/><circle cx="800" cy="160" r="1"/>
    <circle cx="40" cy="200" r="1"/><circle cx="80" cy="200" r="1"/><circle cx="120" cy="200" r="1"/><circle cx="160" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="240" cy="200" r="1"/><circle cx="280" cy="200" r="1"/><circle cx="320" cy="200" r="1"/><circle cx="360" cy="200" r="1"/><circle cx="400" cy="200" r="1"/><circle cx="440" cy="200" r="1"/><circle cx="480" cy="200" r="1"/><circle cx="520" cy="200" r="1"/><circle cx="560" cy="200" r="1"/><circle cx="600" cy="200" r="1"/><circle cx="640" cy="200" r="1"/><circle cx="680" cy="200" r="1"/><circle cx="720" cy="200" r="1"/><circle cx="760" cy="200" r="1"/><circle cx="800" cy="200" r="1"/>
    <circle cx="40" cy="240" r="1"/><circle cx="80" cy="240" r="1"/><circle cx="120" cy="240" r="1"/><circle cx="160" cy="240" r="1"/><circle cx="200" cy="240" r="1"/><circle cx="240" cy="240" r="1"/><circle cx="280" cy="240" r="1"/><circle cx="320" cy="240" r="1"/><circle cx="360" cy="240" r="1"/><circle cx="400" cy="240" r="1"/><circle cx="440" cy="240" r="1"/><circle cx="480" cy="240" r="1"/><circle cx="520" cy="240" r="1"/><circle cx="560" cy="240" r="1"/><circle cx="600" cy="240" r="1"/><circle cx="640" cy="240" r="1"/><circle cx="680" cy="240" r="1"/><circle cx="720" cy="240" r="1"/><circle cx="760" cy="240" r="1"/><circle cx="800" cy="240" r="1"/>
  </g>

  <!-- Floating ambient particles -->
  <circle cx="720" cy="50" r="1.5" fill="#818cf8" class="dot-particle" style="animation-delay:0s"/>
  <circle cx="760" cy="230" r="1" fill="#c4b5fd" class="dot-particle" style="animation-delay:1.2s"/>
  <circle cx="650" cy="250" r="1.5" fill="#a78bfa" class="dot-particle" style="animation-delay:0.6s"/>
  <circle cx="45" cy="60" r="1" fill="#818cf8" class="dot-particle" style="animation-delay:1.8s"/>
  <circle cx="790" cy="140" r="1" fill="#c4b5fd" class="dot-particle" style="animation-delay:2.4s"/>


  <!-- ===== HTML DOCUMENT ===== -->
  <g class="html-doc" filter="url(#docShadow)">
    <!-- Page body -->
    <rect x="80" y="72" width="70" height="90" rx="4" fill="#1a1a2e" stroke="#2a2a45" stroke-width="1.2"/>
    <!-- Page fold corner -->
    <path d="M136 72 L150 72 L150 86 Z" fill="#22223a"/>
    <path d="M136 72 L136 86 L150 86" fill="none" stroke="#3a3a58" stroke-width="0.8"/>

    <!-- Content lines (code-like) -->
    <g class="doc-line-anim">
      <line x1="90" y1="88" x2="108" y2="88" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
      <line x1="110" y1="88" x2="130" y2="88" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:0.65s">
      <line x1="90" y1="96" x2="125" y2="96" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:0.8s">
      <line x1="90" y1="104" x2="118" y2="104" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="120" y1="104" x2="135" y2="104" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:0.95s">
      <line x1="90" y1="112" x2="132" y2="112" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:1.1s">
      <line x1="90" y1="120" x2="110" y2="120" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
      <line x1="112" y1="120" x2="128" y2="120" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:1.25s">
      <line x1="90" y1="128" x2="120" y2="128" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
    </g>

    <!-- HTML badge -->
    <rect x="89" y="139" width="42" height="16" rx="3" fill="url(#htmlGrad)" opacity="0.9"/>
    <text x="96" y="151" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.5">&lt;HTML&gt;</text>
  </g>


  <!-- ===== ARROW ===== -->
  <g class="arrow-group" filter="url(#arrowGlow)">
    <!-- Trail dots -->
    <circle cx="167" cy="118" r="1.5" fill="#818cf8" opacity="0.2"/>
    <circle cx="173" cy="118" r="1.5" fill="#818cf8" opacity="0.3"/>
    <circle cx="179" cy="118" r="1.8" fill="#a78bfa" opacity="0.5"/>

    <!-- Main arrow line -->
    <line x1="183" y1="118" x2="205" y2="118" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Arrow head -->
    <polyline points="200,112 208,118 200,124" fill="none" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>


  <!-- ===== PDF DOCUMENT ===== -->
  <g class="pdf-doc" filter="url(#docShadow)">
    <!-- Page body -->
    <rect x="220" y="72" width="70" height="90" rx="4" fill="#1a1a2e" stroke="#2a2a45" stroke-width="1.2"/>
    <!-- Page fold corner -->
    <path d="M276 72 L290 72 L290 86 Z" fill="#22223a"/>
    <path d="M276 72 L276 86 L290 86" fill="none" stroke="#3a3a58" stroke-width="0.8"/>

    <!-- Content lines (formatted text) -->
    <g class="doc-line-anim" style="animation-delay:0.7s">
      <line x1="230" y1="90" x2="270" y2="90" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:0.85s">
      <rect x="230" y="97" width="48" height="24" rx="2" fill="#2a2a45" opacity="0.6"/>
      <!-- Mini table lines -->
      <line x1="230" y1="105" x2="278" y2="105" stroke="#3a3a58" stroke-width="0.6"/>
      <line x1="230" y1="113" x2="278" y2="113" stroke="#3a3a58" stroke-width="0.6"/>
      <line x1="254" y1="97" x2="254" y2="121" stroke="#3a3a58" stroke-width="0.6"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:1.1s">
      <line x1="230" y1="129" x2="268" y2="129" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    </g>
    <g class="doc-line-anim" style="animation-delay:1.25s">
      <line x1="230" y1="137" x2="255" y2="137" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    </g>

    <!-- PDF badge -->
    <rect x="237" y="139" width="34" height="16" rx="3" fill="url(#pdfGrad)" opacity="0.9"/>
    <text x="243" y="151" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.5">PDF</text>
  </g>


  <!-- ===== TITLE: Html2PdfSmith ===== -->
  <g class="hero-title">
    <text x="340" y="120" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="56" font-weight="800" fill="url(#g1)" letter-spacing="-2">Html2Pdf</text>
  </g>
  <g class="hero-smith">
    <text x="635" y="120" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="56" font-weight="800" fill="#f1f5f9" letter-spacing="-2">Smith</text>
  </g>

  <!-- Tagline -->
  <text x="342" y="148" class="tagline-text" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="14" fill="#64748b" letter-spacing="2.5" opacity="0">BROWSERLESS HTML-TO-PDF ENGINE</text>


  <!-- ===== FEATURE PILLS ===== -->
  <g class="pill pill-1" opacity="0">
    <rect x="340" y="168" width="88" height="28" rx="14" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="358" y="186" font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="600" fill="#a78bfa">⚡ ~123ms</text>
  </g>
  <g class="pill pill-2" opacity="0">
    <rect x="438" y="168" width="100" height="28" rx="14" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="452" y="186" font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="600" fill="#a78bfa">🪶 ~41MB RSS</text>
  </g>
  <g class="pill pill-3" opacity="0">
    <rect x="548" y="168" width="118" height="28" rx="14" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="562" y="186" font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="600" fill="#a78bfa">🚫 No Chromium</text>
  </g>
  <g class="pill pill-4" opacity="0">
    <rect x="676" y="168" width="100" height="28" rx="14" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="692" y="186" font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="600" fill="#a78bfa">📄 Streaming</text>
  </g>


  <!-- ===== TECH BADGES: TypeScript + Bun ===== -->

  <!-- TypeScript badge -->
  <g class="tech-badge tech-ts" opacity="0">
    <rect x="340" y="210" width="106" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <!-- TS logo: blue square with "TS" -->
    <rect x="348" y="216" width="18" height="18" rx="2.5" fill="#3178c6"/>
    <text x="351" y="229" font-family="ui-sans-serif,sans-serif" font-size="10" font-weight="800" fill="#fff">TS</text>
    <!-- Label -->
    <text x="372" y="230" font-family="ui-sans-serif,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8">TypeScript</text>
  </g>

  <!-- Bun badge -->
  <g class="tech-badge tech-bun" opacity="0">
    <rect x="456" y="210" width="72" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <!-- Bun logo: circle with face -->
    <circle cx="473" cy="225" r="9" fill="#fbf0df"/>
    <ellipse cx="470" cy="223" rx="1.5" ry="2" fill="#3a2a1a"/>
    <ellipse cx="476" cy="223" rx="1.5" ry="2" fill="#3a2a1a"/>
    <path d="M469 227 Q473 231 477 227" fill="none" stroke="#3a2a1a" stroke-width="1" stroke-linecap="round"/>
    <!-- Bun sprout -->
    <path d="M473 215 C473 211 469 210 470 214" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M473 215 C473 210 477 210 476 214" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Label -->
    <text x="487" y="230" font-family="ui-sans-serif,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8">Bun</text>
  </g>

  <!-- Version badge -->
  <g class="tech-badge" style="animation-delay:0.9s" opacity="0">
    <rect x="538" y="210" width="58" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="551" y="230" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" font-weight="600" fill="#818cf8">v0.1.0</text>
  </g>


  <!-- ===== DECORATIVE CORNER ACCENTS ===== -->
  <!-- Top-left corner lines -->
  <g opacity="0.08">
    <line x1="24" y1="24" x2="24" y2="44" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="24" x2="44" y2="24" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Bottom-right corner lines -->
  <g opacity="0.08">
    <line x1="816" y1="256" x2="816" y2="236" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="816" y1="256" x2="796" y2="256" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
